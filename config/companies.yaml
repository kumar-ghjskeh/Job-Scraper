# ════════════════════════════════════════════════════════════════════════════
#  Job Scraper — Company Sources
#
#  Every ENABLED company below has been live-verified to return real job data
#  through a clean public JSON API (Greenhouse / Lever / Ashby / Workday CXS).
#  No HTML scraping, no headless browser → zero "errors on company sites".
#
#  Verify any time with:   py scripts/verify_sources.py
#  Discover new slugs with: py scripts/discover_sources.py
#
#  DISABLED companies are kept for reference. They use a stale endpoint,
#  an anti-bot-protected Workday tenant, or a non-API custom site (iCIMS,
#  Phenom, Eightfold) and need a dedicated scraper before re-enabling.
# ════════════════════════════════════════════════════════════════════════════

