name: Keep backend awake

# Pings the Render health endpoint every ~10 minutes so the free-tier web
# service does not spin down. While it's awake the APScheduler tier-based
# scrapes + daily digest actually run. No third-party uptime service needed.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (GitHub may delay during peak load)
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          echo "Pinging backend health endpoint…"
          curl -sS --fail --max-time 90 --retry 3 --retry-delay 15 \
            https://job-scraper-api-w0h8.onrender.com/health
          echo ""
          echo "OK"
