# Render Blueprint — deploys the Job Scraper backend (FastAPI + APScheduler).
# The database is NEON (free, persistent Postgres) — NOT Render's free Postgres,
# which auto-deletes ~30 days after creation. Set DATABASE_URL in the Render
# dashboard to the Neon connection string. The frontend deploys separately to
# Vercel; scraping runs 24/7 in GitHub Actions writing straight to Neon.

services:
  - type: web
    name: job-scraper-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false   # ← set to your NEON connection string in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: CORS_ORIGINS
        sync: false   # set to your Vercel URL, e.g. https://job-scraper-tau-teal.vercel.app
      # Scraping is external (GitHub Actions -> Neon), so the web service does NO
      # scraping: it's a lean read-only API. This keeps /health fast and avoids
      # Render's "health check timed out" emails caused by scrapes hogging the CPU.
      - key: RUN_SCRAPE_ON_STARTUP
        value: "false"
      - key: ENABLE_SCHEDULER
        value: "false"
      # Optional: VAPID private key enables Web Push saved-search alerts. The
      # public key ships in config; set this secret to the matching private key.
      - key: VAPID_PRIVATE_KEY
        sync: false
