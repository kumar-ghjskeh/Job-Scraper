# Render Blueprint — deploys the Job Scraper backend (FastAPI + APScheduler).
# The database is NEON (free, persistent Postgres) — NOT Render's free Postgres,
# which auto-deletes ~30 days after creation. Set DATABASE_URL in the Render
# dashboard to the Neon connection string. The frontend deploys separately to
# Vercel; scraping runs 24/7 in GitHub Actions writing straight to Neon.

services:
  - type: web
    name: job-scraper-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false   # ← set to your NEON connection string in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: CORS_ORIGINS
        sync: false   # set to your Vercel URL, e.g. https://job-scraper-tau-teal.vercel.app
      - key: RUN_SCRAPE_ON_STARTUP
        value: "true"
