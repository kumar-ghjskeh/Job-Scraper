# Render Blueprint — deploys the Job Scraper backend + Postgres.
# Push this repo to GitHub, then in Render: New → Blueprint → pick this repo.
# The frontend deploys separately to Vercel (see frontend/vercel.json).

databases:
  - name: job-scraper-db
    plan: free
    databaseName: jobscraper
    user: jobscraper

services:
  - type: web
    name: job-scraper-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-scraper-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: CORS_ORIGINS
        sync: false   # set to your Vercel URL, e.g. https://job-scraper.vercel.app
      - key: RUN_SCRAPE_ON_STARTUP
        value: "true"
